<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibertəhlükəsizlik testi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f4f8;
            color: #222
        }

        .wrap {
            max-width: 850px;
            margin: 0 auto;
            padding: 18px
        }

        .box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, .08);
            margin-bottom: 16px
        }

        button {
            background: #2563eb;
            color: white;
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            cursor: pointer;
            margin: 6px 4px 6px 0
        }

        button.gray {
            background: #e5e7eb;
            color: #111
        }

        button.red {
            background: #dc2626
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .85
        }

        .option {
            display: block;
            width: 100%;
            text-align: left;
            background: #f3f4f6;
            color: #111;
            margin: 10px 0;
            border: 2px solid transparent
        }

        .option.correct {
            background: #dcfce7;
            border-color: #16a34a
        }

        .option.wrong {
            background: #fee2e2;
            border-color: #dc2626
        }

        .feedback {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold
        }

        .feedback.ok {
            background: #dcfce7;
            color: #166534
        }

        .feedback.bad {
            background: #fee2e2;
            color: #991b1b
        }

        .hidden {
            display: none
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.45;
            margin: 15px 0
        }

        .small {
            color: #666
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #bbb;
            font-size: 16px;
            width: 100px
        }

        .review {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0
        }

        .ok {
            color: green;
            font-weight: bold
        }

        .bad {
            color: #dc2626;
            font-weight: bold
        }

        @media(max-width:600px) {
            button {
                width: 100%
            }

            input {
                width: 100%;
                margin: 8px 0
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div id="start" class="box">
            <h1>Kibertəhlükəsizlik testi</h1>
            <p class="small">100 sual var. Hər dəfə suallar və cavab variantları qarışdırılır. Cavab seçən kimi
                düzgün/səhv göstərilir.</p>
            <p>Sual sayı: <input id="count" type="number" min="1" max="100" value="50"></p><button
                onclick="startQuiz()">Testə başla</button>
        </div>
        <div id="quiz" class="box hidden">
            <div id="progress" class="small"></div>
            <div id="qText" class="question"></div>
            <div id="answers"></div>
            <div id="feedback"></div><button class="gray" onclick="prevQ()">Geri</button><button
                onclick="nextQ()">Növbəti</button><button class="red" onclick="finishQuiz()">Testi bitir</button>
        </div>
        <div id="result" class="box hidden">
            <h1>Nəticə</h1>
            <p id="score"></p><button onclick="startQuiz()">Yenidən keç</button><button class="gray"
                onclick="showMistakes()">Səhvləri göstər</button><button class="gray" onclick="showAll()">Bütün
                cavabları göstər</button>
        </div>
        <div id="review" class="box hidden">
            <h2 id="reviewTitle"></h2>
            <div id="reviewBox"></div>
        </div>
    </div>
    <script>const BANK = [{ "num": 1, "question": "Firewall-un əsas funksiyası nədir?", "options": ["Şəbəkə trafikinə nəzarət etmək", "Kompüteri sürətləndirmək", "Printer idarə etmək", "Monitoru qorumaq"], "correctIndex": 0 }, { "num": 2, "question": "Güclü parol hansı xüsusiyyətə malik olmalıdır?", "options": ["Yalnız rəqəm", "Qısa və sadə", "Böyük, kiçik hərf, rəqəm və simvol qarışığı", "Ad və soyad"], "correctIndex": 2 }, { "num": 3, "question": "Phishing hücumu nədir?", "options": ["Şəbəkə sürətləndirməsi", "İstifadəçidən saxta yollarla məlumat oğurlama", "Disk formatlama", "Fayl arxivləşdirmə"], "correctIndex": 1 }, { "num": 4, "question": "VPN istifadəsinin əsas məqsədi nədir?", "options": ["Kompüteri söndürmək", "Təhlükəsiz əlaqə yaratmaq", "Antivirus əvəz etmək", "Monitor ölçüsünü dəyişmək"], "correctIndex": 1 }, { "num": 5, "question": "Antivirus proqramının əsas vəzifəsi nədir?", "options": ["Virusları aşkar edib silmək", "İnterneti sürətləndirmək", "Printeri idarə etmək", "Monitoru qorumaq"], "correctIndex": 0 }, { "num": 6, "question": "SQL Injection hansı hücum növüdür?", "options": ["Fiziki hücum", "Verilənlər bazasına yönəlmiş hücum", "Elektrik hücumu", "Şəbəkə kabeli hücumu"], "correctIndex": 1 }, { "num": 7, "question": "İki faktorlu identifikasiya nədir?", "options": ["İki antivirus istifadəsi", "İki müxtəlif doğrulama üsulu ilə giriş", "İki monitor qoşmaq", "İki şəbəkə kartı istifadəsi"], "correctIndex": 1 }, { "num": 8, "question": "DDoS hücumunun məqsədi nədir?", "options": ["Saytı əlçatmaz etmək", "Şifrə dəyişmək", "Printeri sıradan çıxarmaq", "Antivirus yeniləmək"], "correctIndex": 0 }, { "num": 9, "question": "HTTPS protokolu nə təmin edir?", "options": ["Şifrələnmiş əlaqə", "Daha zəif təhlükəsizlik", "Disk idarəsi", "Lokal printer bağlantısı"], "correctIndex": 0 }, { "num": 10, "question": "Malware nədir?", "options": ["Faydalı proqram", "Zərərli proqram təminatı", "Şəbəkə kabeli", "Antivirus sistemi"], "correctIndex": 1 }, { "num": 11, "que answers'); let fb = byId('feedback'); box.innerHTML = ''; fb.innerHTML = ''; q.options.forEach((opt, i) => { let b = document.createElement('button'); b.className = 'option'; if (q.selected >= 0) { if (opt.correct) b.classList.add('correct'); if (q.selected === i && !opt.correct) b.classList.add('wrong'); b.disabled = true } b.textContent = String.fromCharCode(65 + i) + ') ' + opt.text; b.onclick = function () { if (q.selected >= 0) return; q.selected = i; renderQ() }; box.appendChild(b) }); if (q.selected >= 0) { let s = q.options[q.selected]; let c = q.options.find(o => o.correct); if (s.correct) fb.innerHTML = '<div class="feedback ok">Düzgündür ✅</div>'; else fb.innerHTML = '<div class="feedback bad">Səhvdir ❌<br>Düzgün cavab: ' + c.text + '</div>' } } function nextQ() { if (index < quiz.length - 1) { index++; renderQ() } } function prevQ() { if (index > 0) { index--; renderQ() } } function finishQuiz() { let c = 0; quiz.forEach(q => { if (q.selected >= 0 && q.options[q.selected].correct) c++ }); let p = Math.round(c * 100 / quiz.length); hideAll(); byId('result').classList.remove('hidden'); byId('score').innerHTML = 'Düzgün cavablar: <b>' + c + '</b> / <b>' + quiz.length + '</b><br>Faiz: <b>' + p + '%</b>' } function makeReview(onlyBad) { let html = ''; let list = quiz.filter(q => !onlyBad || q.selected < 0 || !q.options[q.selected].correct); if (list.length === 0) html = '<p class="ok">Səhv yoxdur 🎉</p>'; list.forEach(q => { let c = q.options.find(o => o.correct); let s = q.selected >= 0 ? q.options[q.selected] : null; html += '<div class="review"><div class="small">İlkin №' + q.num + '</div><p><b>' + q.question + '</b></p>'; if (s) html += '<p>Sənin cavabın: <span class="' + (s.correct ? 'ok' : 'bad') + '">' + s.text + '</span></p>'; else html += '<p>Sənin cavabın: <span class="bad">cavab yoxdur</span></p>'; html += '<p>Düzgün cavab: <span class="ok">' + c.text + '</span></p></div>' }); byId('reviewBox').innerHTML = html } function showMistakes() { byId('revi
